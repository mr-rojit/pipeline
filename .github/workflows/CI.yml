name: CI
on: push
jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: run ruff checks
        run: |
            uv run ruff check --fix
            uv run ruff format 
        